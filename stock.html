<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Stock Blackwater</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="binder-container">
<div class="old-paper-sheet">

<h1>STOCK BLACKWATER</h1>

<h3 id="agentInfo"></h3>

<button id="btnAdmin" class="btn btn-approve" style="display:none;">
    🏛 Accéder au panel Admin
</button>

<hr>

<!-- ================= AJOUT ================= -->
<h3>AJOUT</h3>

<select id="platSelect"></select>
<input id="platNom" placeholder="Ou nouveau produit">
<input id="platQuantite" type="number" placeholder="Quantité">
<button id="btnAjouter" class="btn">Ajouter</button>

<!-- ================= RETRAIT ================= -->
<h3>RETRAIT</h3>

<select id="retraitSelect"></select>
<input id="retraitPlatNom" placeholder="Ou produit manuel">
<input id="retraitQuantite" type="number" placeholder="Quantité">
<button id="btnRetirer" class="btn btn-danger">Retirer</button>

<hr>

<table class="inventory-table">
<thead>
<tr>
<th>Produit</th>
<th>Quantité</th>
<th>Dernière action</th>
</tr>
</thead>
<tbody id="inventoryBody"></tbody>
</table>

</div>
</div>

<script type="module">
import {
    db,
    doc,
    setDoc,
    getDoc,
    deleteDoc,
    collection,
    onSnapshot,
    addDoc
} from "./firebase.js";

/* ================= SESSION ================= */
const agent = JSON.parse(localStorage.getItem("agent"));

if (!agent) window.location.href = "login.html";

document.getElementById("agentInfo").innerText =
`${agent.grade} ${agent.prenom} ${agent.nom}`;

/* ================= ADMIN ================= */
const btnAdmin = document.getElementById("btnAdmin");

if (agent.role === "admin") {
    btnAdmin.style.display = "inline-block";
    btnAdmin.onclick = () => window.location.href = "admin.html";
}

/* ================= ACCESS ================= */
async function checkAccess() {
    const ref = doc(db, "agents", `${agent.prenom}_${agent.nom}`);
    const snap = await getDoc(ref);
    return snap.exists() && snap.data().approuve === true;
}

/* ================= DATE ================= */
function nowDate() {
    return new Date().toLocaleString("fr-FR", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
    });
}

/* ================= ELEMENTS ================= */
const platSelect = document.getElementById("platSelect");
const retraitSelect = document.getElementById("retraitSelect");
const body = document.getElementById("inventoryBody");

/* ================= LIVE STOCK ================= */
onSnapshot(collection(db, "stock"), (snap) => {

    body.innerHTML = "";

    // reset propre des select
    platSelect.innerHTML = "";
    retraitSelect.innerHTML = "";

    const optionDefault = `<option value="">-- choisir produit --</option>`;
    platSelect.innerHTML = optionDefault;
    retraitSelect.innerHTML = optionDefault;

    let hasData = false;

    snap.forEach(d => {
        const data = d.data();
        if (!data.nom) return;

        hasData = true;

        const nom = data.nom;

        platSelect.innerHTML += `<option value="${nom}">${nom}</option>`;
        retraitSelect.innerHTML += `<option value="${nom}">${nom}</option>`;

        body.innerHTML += `
        <tr>
            <td>${nom}</td>
            <td>${data.quantite ?? 0}</td>
            <td>${data.last ?? ""} ${data.action ? "(" + data.action + ")" : ""}</td>
        </tr>`;
    });

    if (!hasData) {
        body.innerHTML = `
        <tr>
            <td colspan="3">Aucun produit dans le stock</td>
        </tr>`;
    }
});

/* ================= AJOUT ================= */
document.getElementById("btnAjouter").addEventListener("click", async () => {

    if (!await checkAccess()) return alert("Accès refusé");

    const nom = (platSelect.value || platNom.value).trim().toLowerCase();
    const qty = parseInt(document.getElementById("platQuantite").value);

    if (!nom || isNaN(qty) || qty <= 0) return;

    const ref = doc(db, "stock", nom);
    const snap = await getDoc(ref);

    let total = qty;
    if (snap.exists()) total += snap.data().quantite;

    await setDoc(ref, {
        nom,
        quantite: total,
        last: `${agent.prenom} ${agent.nom}`,
        action: "Ajout"
    });

    await addDoc(collection(db, "logs_stock"), {
        nom,
        quantite: qty,
        action: "Ajout",
        agent: `${agent.prenom} ${agent.nom}`,
        date: nowDate()
    });

    platNom.value = "";
    document.getElementById("platQuantite").value = "";
});

/* ================= RETRAIT ================= */
document.getElementById("btnRetirer").addEventListener("click", async () => {

    if (!await checkAccess()) return alert("Accès refusé");

    const nom = (retraitSelect.value || retraitPlatNom.value).trim().toLowerCase();
    const qty = parseInt(document.getElementById("retraitQuantite").value);

    if (!nom || isNaN(qty) || qty <= 0) return;

    const ref = doc(db, "stock", nom);
    const snap = await getDoc(ref);

    if (!snap.exists()) return alert("Produit inexistant");

    let newQty = snap.data().quantite - qty;

    if (newQty <= 0) {
        await deleteDoc(ref);
    } else {
        await setDoc(ref, {
            nom,
            quantite: newQty,
            last: `${agent.prenom} ${agent.nom}`,
            action: `Retrait (-${qty})`
        });
    }

    await addDoc(collection(db, "logs_stock"), {
        nom,
        quantite: qty,
        action: "Retrait",
        agent: `${agent.prenom} ${agent.nom}`,
        date: nowDate()
    });

    retraitPlatNom.value = "";
    document.getElementById("retraitQuantite").value = "";
});

</script>

</body>
</html>
