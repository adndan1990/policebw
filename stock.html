<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Stock Blackwater</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="binder-container">
<div class="old-paper-sheet">

<h1>STOCK BLACKWATER</h1>

<h3 id="agentInfo"></h3>

<h3>AJOUT</h3>
<input id="platNom" placeholder="Produit">
<input id="platQuantite" type="number">
<button id="btnAjouter">Ajouter</button>

<h3>RETRAIT</h3>
<input id="retraitPlatNom" placeholder="Produit">
<input id="retraitQuantite" type="number">
<button id="btnRetirer">Retirer</button>

<hr>

<table class="inventory-table">
<thead>
<tr>
<th>Produit</th>
<th>Quantité</th>
<th>Action</th>
</tr>
</thead>
<tbody id="inventoryBody"></tbody>
</table>

</div>
</div>

<script type="module">
import {
  db,
  doc,
  setDoc,
  getDoc,
  deleteDoc,
  collection,
  onSnapshot
} from "./firebase.js";

// ================= SESSION =================
const agent = JSON.parse(localStorage.getItem("agent"));

if (!agent) window.location.href = "login.html";

document.getElementById("agentInfo").innerText =
`${agent.grade} ${agent.prenom} ${agent.nom}`;

// ================= CHECK =================
async function checkAgent() {
  const id = `${agent.prenom}_${agent.nom}`;
  const snap = await getDoc(doc(db, "agents", id));
  return snap.exists() && snap.data().code === agent.code;
}

// ================= AJOUT =================
document.getElementById("btnAjouter").addEventListener("click", async () => {

  if (!await checkAgent()) return alert("Code invalide");

  const nom = platNom.value.trim().toLowerCase();
  const qty = parseInt(platQuantite.value);

  const ref = doc(db, "stock", nom);
  const snap = await getDoc(ref);

  let total = qty;
  if (snap.exists()) total += snap.data().quantite;

  await setDoc(ref, {
    nom,
    quantite: total,
    last: `${agent.prenom} ${agent.nom}`,
    action: "Ajout"
  });
});

// ================= RETRAIT =================
document.getElementById("btnRetirer").addEventListener("click", async () => {

  if (!await checkAgent()) return alert("Code invalide");

  const nom = retraitPlatNom.value.trim().toLowerCase();
  const qty = parseInt(retraitQuantite.value);

  const ref = doc(db, "stock", nom);
  const snap = await getDoc(ref);

  if (!snap.exists()) return;

  let newQty = snap.data().quantite - qty;

  if (newQty <= 0) {
    await deleteDoc(ref);
  } else {
    await setDoc(ref, {
      nom,
      quantite: newQty,
      last: `${agent.prenom} ${agent.nom}`,
      action: `Retrait (-${qty})`
    });
  }
});

// ================= LIVE =================
onSnapshot(collection(db, "stock"), (snap) => {

  const body = document.getElementById("inventoryBody");
  body.innerHTML = "";

  snap.forEach(d => {
    const data = d.data();

    body.innerHTML += `
      <tr>
        <td>${data.nom}</td>
        <td>${data.quantite}</td>
        <td>${data.last} ${data.action}</td>
      </tr>
    `;
  });
});
</script>

</body>
</html>
