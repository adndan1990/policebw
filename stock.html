<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Stock Blackwater</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="binder-container">
<div class="old-paper-sheet">

<h1>REGISTRE STOCK</h1>

<h3 id="agentInfo"></h3>

<!-- AJOUT -->
<input id="platNom" placeholder="Produit">
<input id="platQuantite" type="number" placeholder="Quantité">
<button id="btnAjouter">Ajouter</button>

<hr>

<!-- RETRAIT -->
<input id="retraitNom" placeholder="Produit">
<input id="retraitQuantite" type="number" placeholder="Quantité">
<button id="btnRetirer">Retirer</button>

<hr>

<table class="inventory-table">
<thead>
<tr>
<th>Produit</th>
<th>Quantité</th>
<th>Action</th>
</tr>
</thead>
<tbody id="inventoryBody"></tbody>
</table>

</div>
</div>

<script type="module" src="./app.js"></script>

</body>
</html>
