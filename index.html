<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackwater Police - Registre</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="binder-container">
    <div class="old-paper-sheet">

        <header class="police-header">
            <h1>BLACKWATER POLICE DEPARTMENT</h1>
            <h2>REGISTRE OFFICIEL DES SUBSISTANCES</h2>
        </header>

        <!-- AGENT -->
        <section class="form-section">
            <h3>IDENTITÉ OFFICIER</h3>

            <input type="text" id="agentNom" placeholder="Nom">
            <input type="text" id="agentPrenom" placeholder="Prénom">
            <input type="text" id="agentGrade" placeholder="Grade">
            <input type="password" id="agentCadena" placeholder="Code cadenas (4 chiffres)">
        </section>

        <!-- AJOUT -->
        <section class="form-section">
            <h3>AJOUT DE STOCK</h3>

            <input type="text" id="platNom" placeholder="Nom du produit">
            <input type="number" id="platQuantite" placeholder="Quantité">

            <button id="btnAjouter">Ajouter au registre</button>
        </section>

        <!-- RETRAIT -->
        <section class="form-section">
            <h3>RETRAIT DE STOCK</h3>

            <input type="text" id="retraitPlatNom" placeholder="Nom du produit">
            <input type="number" id="retraitQuantite" placeholder="Quantité">

            <button id="btnRetirer">Retirer du registre</button>
        </section>

        <!-- INVENTAIRE -->
        <section class="form-section">
            <h3>INVENTAIRE</h3>

            <table border="1">
                <thead>
                    <tr>
                        <th>Produit</th>
                        <th>Quantité</th>
                        <th>Dernière action</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </section>

    </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    updateDoc,
    deleteDoc,
    collection,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "TON_API_KEY",
    authDomain: "police-bw.firebaseapp.com",
    projectId: "police-bw",
    storageBucket: "police-bw.appspot.com",
    messagingSenderId: "606303723293",
    appId: "1:606303723293:web:2df34f7a461d42d1580bf4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// export global
window.dbInstance = db;

window.firestoreTools = {
    doc,
    setDoc,
    getDoc,
    updateDoc,
    deleteDoc,
    collection,
    onSnapshot
};
</script>

<!-- TON JS -->
<script src="app.js" defer></script>

</body>
</html>
