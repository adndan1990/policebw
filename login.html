<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Blackwater - Auth</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="binder-container">
<div class="old-paper-sheet">

<h1>REGISTRE DES AGENTS</h1>

<!-- SWITCH MODE -->
<button onclick="toggleMode()" class="btn">Changer mode</button>

<!-- REGISTER -->
<div id="registerBox">

<h3>Créer un agent</h3>

<input id="r_nom" placeholder="Nom">
<input id="r_prenom" placeholder="Prénom">
<input id="r_grade" placeholder="Grade">
<input id="r_code" placeholder="Code cadenas">

<button id="registerBtn" class="btn">Créer</button>

</div>

<!-- LOGIN -->
<div id="loginBox" style="display:none;">

<h3>Connexion agent</h3>

<select id="agentList"></select>
<input id="login_code" placeholder="Code cadenas">

<button id="loginBtn" class="btn">Connexion</button>

</div>

</div>
</div>

<script type="module">
import {
db, doc, setDoc, collection, getDocs
} from "./firebase.js";

/* SWITCH UI */
window.toggleMode = () => {
document.getElementById("registerBox").style.display =
document.getElementById("registerBox").style.display === "none" ? "block" : "none";

document.getElementById("loginBox").style.display =
document.getElementById("loginBox").style.display === "none" ? "block" : "none";
};

/* CREATE AGENT */
document.getElementById("registerBtn").onclick = async () => {

const nom = document.getElementById("r_nom").value;
const prenom = document.getElementById("r_prenom").value;
const grade = document.getElementById("r_grade").value;
const code = document.getElementById("r_code").value;

const id = prenom.toLowerCase() + "_" + nom.toLowerCase();

await setDoc(doc(db, "agents", id), {
nom, prenom, grade, code
});

alert("Agent créé");
loadAgents();
};

/* LOAD AGENTS */
async function loadAgents() {

const snap = await getDocs(collection(db, "agents"));
const list = document.getElementById("agentList");

list.innerHTML = "";

snap.forEach(d => {
const a = d.data();

const opt = document.createElement("option");
opt.value = d.id;
opt.textContent = a.prenom + " " + a.nom;
opt.dataset.code = a.code;

list.appendChild(opt);
});
}

/* LOGIN */
document.getElementById("loginBtn").onclick = () => {

const select = document.getElementById("agentList");
const opt = select.options[select.selectedIndex];

const code = document.getElementById("login_code").value;

if (code === opt.dataset.code) {

localStorage.setItem("agent", JSON.stringify({
id: opt.value,
name: opt.textContent
}));

window.location.href = "stock.html";

} else {
alert("Code incorrect");
}

};

loadAgents();
</script>

</body>
</html>
