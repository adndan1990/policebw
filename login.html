<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="binder-container">
<div class="old-paper-sheet">

<h1>CONNEXION OFFICIER</h1>

<select id="agents"></select>
<input id="code" placeholder="Code cadenas">

<button class="btn" id="login">Connexion</button>

<p><a href="register.html">Créer un agent</a></p>

</div>
</div>

<script type="module">
import { db, collection, getDocs } from "./firebase.js";

const select = document.getElementById("agents");

// charger agents
const snap = await getDocs(collection(db, "agents"));

snap.forEach(doc => {
    const a = doc.data();
    const opt = document.createElement("option");
    opt.value = doc.id;
    opt.textContent = a.prenom + " " + a.nom;
    opt.dataset.code = a.code;
    select.appendChild(opt);
});

document.getElementById("login").onclick = () => {

    const selected = select.options[select.selectedIndex];
    const code = document.getElementById("code").value;

    if (code === selected.dataset.code) {

        localStorage.setItem("agent", JSON.stringify({
            id: selected.value,
            name: selected.textContent
        }));

        window.location.href = "stock.html";
    } else {
        alert("Code incorrect");
    }
};
</script>

</body>
</html>
