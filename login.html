<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Blackwater Police - Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="binder-container">
<div class="old-paper-sheet">

<h1>REGISTRE OFFICIEL</h1>

<!-- INSCRIPTION -->
<h3>INSCRIPTION</h3>

<input id="regNom" placeholder="Nom">
<input id="regPrenom" placeholder="Prénom">
<input id="regGrade" placeholder="Grade">
<input id="regCode" placeholder="Code cadenas">

<button id="btnRegister" class="btn">Créer agent</button>

<hr>

<!-- CONNEXION -->
<h3>CONNEXION</h3>

<input id="logNom" placeholder="Nom">
<input id="logPrenom" placeholder="Prénom">
<input id="logCode" placeholder="Code cadenas">

<button id="btnLogin" class="btn btn-danger">Entrer registre</button>

</div>
</div>

<!-- ================= FIREBASE ================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import {
    getFirestore,
    doc,
    setDoc,
    getDoc
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
    apiKey: "TON_API_KEY",
    authDomain: "police-bw.firebaseapp.com",
    projectId: "police-bw",
    storageBucket: "police-bw.appspot.com",
    messagingSenderId: "606303723293",
    appId: "1:606303723293:web:2df34f7a461d42d1580bf4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* EXPORT GLOBAL */
window.db = db;
window.doc = doc;
window.setDoc = setDoc;
window.getDoc = getDoc;
</script>

<!-- ================= LOGIQUE ================= -->
<script type="module">

const db = window.db;
const doc = window.doc;
const setDoc = window.setDoc;
const getDoc = window.getDoc;

/* ================= ADMIN MARLEY MOORE ================= */
const ADMIN = {
    nom: "moore",
    prenom: "marley",
    code: "7242"
};

/* ================= INSCRIPTION ================= */
document.getElementById("btnRegister").addEventListener("click", async () => {

    const nom = document.getElementById("regNom").value.trim().toLowerCase();
    const prenom = document.getElementById("regPrenom").value.trim().toLowerCase();
    const grade = document.getElementById("regGrade").value.trim();
    const code = document.getElementById("regCode").value.trim();

    if (!nom || !prenom || !code) {
        return alert("Champs incomplets");
    }

    const id = `${prenom}_${nom}`;

    const isAdmin = nom === ADMIN.nom && prenom === ADMIN.prenom;

    await setDoc(doc(db, "agents", id), {
        nom,
        prenom,
        grade,
        codeHash: code,
        role: isAdmin ? "admin" : "agent",
        approuve: isAdmin ? true : false
    });

    alert("Agent envoyé en attente de validation");
});

/* ================= CONNEXION ================= */
document.getElementById("btnLogin").addEventListener("click", async () => {

    const nom = document.getElementById("logNom").value.trim().toLowerCase();
    const prenom = document.getElementById("logPrenom").value.trim().toLowerCase();
    const code = document.getElementById("logCode").value.trim();

    const id = `${prenom}_${nom}`;

    const snap = await getDoc(doc(db, "agents", id));

    if (!snap.exists()) {
        return alert("Agent inconnu");
    }

    const data = snap.data();

    /* 🔐 VERIF CODE */
    if (data.codeHash !== code) {
        return alert("Code incorrect");
    }

    /* 🚫 BLOQUÉ SI NON APPROUVÉ */
    if (!data.approuve) {
        return alert("Agent en attente d'approbation admin");
    }

    /* ❌ ON NE SAUVEGARDE PAS LE CODE */
    const safeAgent = {
        nom: data.nom,
        prenom: data.prenom,
        grade: data.grade,
        role: data.role
    };

    localStorage.setItem("agent", JSON.stringify(safeAgent));

    window.location.href = "stock.html";
});
</script>

</body>
</html>
