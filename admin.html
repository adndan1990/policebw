<h1>APPROBATION AGENTS</h1>

<table>
<thead>
<tr>
<th>Nom</th>
<th>Prénom</th>
<th>Grade</th>
<th>Action</th>
</tr>
</thead>

<tbody id="list"></tbody>
</table>

<script type="module">
import {
  db,
  doc,
  getDoc,
  setDoc,
  collection,
  onSnapshot
} from "./firebase.js";

const admin = JSON.parse(localStorage.getItem("agent"));

if (!admin || admin.role !== "admin") {
    window.location.href = "login.html";
}

/* LISTE AGENTS EN ATTENTE */
onSnapshot(collection(db, "agents"), (snap) => {

    const list = document.getElementById("list");
    list.innerHTML = "";

    snap.forEach(d => {
        const a = d.data();
        const id = d.id;

        if (a.approuve) return;

        list.innerHTML += `
            <tr>
                <td>${a.nom}</td>
                <td>${a.prenom}</td>
                <td>${a.grade}</td>
                <td>
                    <button onclick="approve('${id}')">APPROUVER</button>
                </td>
            </tr>
        `;
    });
});

/* APPROBATION */
window.approve = async (id) => {
    await setDoc(doc(db, "agents", id), {
        approuve: true
    }, { merge: true });

    alert("Agent validé");
};
</script>
