<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Blackwater Admin</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="binder-container">
    <div class="old-paper-sheet">

        <div class="admin-header">
            🏛 BLACKWATER POLICE ADMIN PANEL
        </div>

        <h3>AGENTS EN ATTENTE D'APPROBATION</h3>

        <table class="admin-table">
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Grade</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="agentList"></tbody>
        </table>

    </div>
</div>

<script type="module">
import { db, collection, onSnapshot, doc, updateDoc } from "./firebase.js";

const list = document.getElementById("agentList");

/* =========================
   CHARGEMENT AGENTS
========================= */
onSnapshot(collection(db, "agents"), (snap) => {

    list.innerHTML = "";

    snap.forEach((d) => {
        const a = d.data();

        if (a.approuve) return; // déjà validé

        const id = d.id;

        list.innerHTML += `
            <tr>
                <td>${a.nom}</td>
                <td>${a.prenom}</td>
                <td>${a.grade}</td>
                <td>
                    <button class="btn-approve" data-id="${id}">
                        APPROUVER
                    </button>
                </td>
            </tr>
        `;
    });
});

/* =========================
   APPROBATION
========================= */
document.addEventListener("click", async (e) => {

    if (e.target.classList.contains("btn-approve")) {

        const id = e.target.dataset.id;

        await updateDoc(doc(db, "agents", id), {
            approuve: true
        });

        alert("Agent approuvé ✔");
    }
});
</script>

</body>
</html>
