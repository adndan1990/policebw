<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Blackwater Admin</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="binder-container">
<div class="old-paper-sheet">

<h1>🏛 ADMIN PANEL BLACKWATER</h1>

<h3>GESTION DES AGENTS</h3>

<table class="admin-table">
<thead>
<tr>
<th>Nom</th>
<th>Prénom</th>
<th>Grade</th>
<th>Statut</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="agentList"></tbody>
</table>

</div>
</div>

<script type="module">
import { db, collection, onSnapshot, doc, updateDoc } from "./firebase.js";

/* =========================
   SECURITE ADMIN
========================= */
const agent = JSON.parse(localStorage.getItem("agent"));

if (!agent || agent.role !== "admin") {
    alert("Accès refusé");
    window.location.href = "stock.html";
}

const list = document.getElementById("agentList");

/* =========================
   LOAD AGENTS
========================= */
onSnapshot(collection(db, "agents"), (snap) => {

    list.innerHTML = "";

    snap.forEach((d) => {
        const a = d.data();
        const id = d.id;

        list.innerHTML += `
        <tr>
            <td>${a.nom}</td>
            <td>${a.prenom}</td>
            <td>${a.grade}</td>
            <td>
                ${a.approuve ? "✔ Approuvé" : "⏳ En attente"}<br>
                ${a.role === "admin" ? "👮 Admin" : "👤 Agent"}
            </td>
            <td>

                <!-- APPROUVER -->
                <button class="btn-approve" data-id="${id}">
                    Approuver
                </button>

                <!-- PROMOUVOIR ADMIN -->
                <button class="btn" data-admin="${id}">
                    Donner Admin
                </button>

            </td>
        </tr>`;
    });
});

/* =========================
   ACTIONS
========================= */
document.addEventListener("click", async (e) => {

    /* APPROBATION AGENT */
    if (e.target.dataset.id) {

        const id = e.target.dataset.id;

        await updateDoc(doc(db, "agents", id), {
            approuve: true
        });

        alert("Agent approuvé ✔");
    }

    /* PROMOTION ADMIN */
    if (e.target.dataset.admin) {

        const id = e.target.dataset.admin;

        await updateDoc(doc(db, "agents", id), {
            role: "admin",
            approuve: true
        });

        alert("Agent promu ADMIN 👮");
    }
});
</script>

</body>
</html>
