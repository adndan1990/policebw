<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Register Agent</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="binder-container">
<div class="old-paper-sheet">

<h1>REGISTRE DES AGENTS</h1>

<input id="nom" placeholder="Nom">
<input id="prenom" placeholder="Prénom">
<input id="grade" placeholder="Grade">
<input id="code" placeholder="Code cadenas">

<button class="btn" id="create">Créer agent</button>

<p><a href="login.html">Retour connexion</a></p>

</div>
</div>

<script type="module">
import { db, doc, setDoc } from "./firebase.js";

document.getElementById("create").onclick = async () => {

    const nom = document.getElementById("nom").value;
    const prenom = document.getElementById("prenom").value;
    const grade = document.getElementById("grade").value;
    const code = document.getElementById("code").value;

    const id = prenom.toLowerCase() + "_" + nom.toLowerCase();

    await setDoc(doc(db, "agents", id), {
        nom, prenom, grade, code, approuve: true
    });

    alert("Agent créé");
};
</script>

</body>
</html>
